<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Chemistry Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --teal: #0e7490;
  --teal-light: #22d3ee;
  --gold: #f59e0b;
  --red: #ef4444;
  --green: #10b981;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 80px;
}
.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift 12s ease-in-out infinite alternate; }
.orb1 { width: 500px; height: 500px; background: #0e7490; top: -100px; right: -100px; }
.orb2 { width: 400px; height: 400px; background: #92400e; top: 40%; left: -80px; animation-delay: 3s; }
.orb3 { width: 300px; height: 300px; background: #1d4ed8; bottom: 10%; right: 20%; animation-delay: 6s; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(30px,40px) scale(1.08)} }

.sticky {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: rgba(10,22,40,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(14,116,144,0.3); padding: 10px 20px;
}
.sticky-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pill { padding: 5px 14px; border-radius: 20px; font-size: .8em; font-weight: 600; white-space: nowrap; }
.pill-q { background: rgba(255,255,255,.1); color: #e2e8f0; border: 1px solid rgba(255,255,255,.2); }
.pill-c { background: rgba(16,185,129,.2); color: #6ee7b7; border: 1px solid #10b981; }
.pill-w { background: rgba(239,68,68,.2); color: #fca5a5; border: 1px solid #ef4444; }
.pill-p { background: rgba(245,158,11,.2); color: #fcd34d; border: 1px solid #f59e0b; }
.prog-wrap { flex:1; background: rgba(255,255,255,.1); border-radius: 8px; height: 6px; min-width: 60px; overflow: hidden; }
.prog-fill { background: linear-gradient(90deg, var(--teal), var(--gold)); height: 100%; border-radius: 8px; transition: width .5s; }

#startScreen { position: relative; z-index: 1; max-width: 680px; margin: 60px auto 0; padding: 20px; }
.start-card {
  background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
  border: 1px solid rgba(14,116,144,0.4); border-radius: 24px; padding: 44px 40px;
  box-shadow: 0 40px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,0.1);
}
.book-icon {
  font-size: 3.5em; display: block; text-align: center; margin-bottom: 14px;
  animation: pulse-icon 3s ease-in-out infinite;
}
@keyframes pulse-icon {
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 15px rgba(245,158,11,.4))}
  50%{transform:scale(1.06);filter:drop-shadow(0 0 30px rgba(245,158,11,.8))}
}
.start-card h1 {
  font-family: 'Playfair Display', serif; font-size: 2.2em; font-weight: 900;
  color: #fff; text-align: center; margin-bottom: 6px;
}
.subtitle { text-align: center; color: var(--teal-light); font-size: .95em; margin-bottom: 10px; opacity: .85; }
.credits { text-align: center; color: #94a3b8; font-size: .82em; margin-bottom: 28px; line-height: 1.7; }
.credits-names { color: var(--gold); font-size: 1em; letter-spacing: .02em; }
.section-label { color: #94a3b8; font-size: .8em; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.filter-btn {
  padding: 7px 16px; border-radius: 20px; cursor: pointer; font-size: .85em; font-weight: 500;
  transition: all .2s; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); color: #94a3b8;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,158,11,.08); }
.filter-btn.active {
  background: linear-gradient(135deg,rgba(245,158,11,.3),rgba(245,158,11,.1));
  border-color: var(--gold); color: var(--gold); box-shadow: 0 0 14px rgba(245,158,11,.2);
}
.start-info { color: #64748b; font-size: .9em; text-align: center; margin-bottom: 22px; }
.start-info span { color: var(--gold); font-weight: 700; }
.btn-start {
  width: 100%; padding: 16px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--teal), #0891b2);
  color: #fff; font-size: 1.1em; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .25s; box-shadow: 0 8px 30px rgba(14,116,144,.5);
}
.btn-start:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(14,116,144,.6); }

#quizWrapper { display: none; padding-top: 75px; position: relative; z-index: 1; }

.q-card {
  max-width: 820px; margin: 18px auto; padding: 28px 32px;
  background: rgba(255,255,255,0.97); border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
  border-left: 5px solid rgba(14,116,144,0.3);
  transition: border-color .35s; animation: slideIn .35s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.q-card.answered-correct { border-left-color: var(--green); }
.q-card.answered-wrong   { border-left-color: var(--red); }

.q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.q-num {
  background: linear-gradient(135deg, var(--teal), #0891b2);
  color: #fff; min-width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85em; flex-shrink: 0;
}
.cat-tag {
  background: linear-gradient(135deg,#1e3a5f,#1d4ed8);
  color: #fff; padding: 3px 12px; border-radius: 20px; font-size: .72em; font-weight: 600;
}
.tf-tag {
  background: linear-gradient(135deg,#064e3b,#10b981);
  color: #fff; padding: 3px 12px; border-radius: 20px; font-size: .72em; font-weight: 600;
}

.q-text { font-size: 1.06em; font-weight: 600; color: #0f172a; line-height: 1.6; margin-bottom: 18px; }
.q-formula { font-family: monospace; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 1em; }

.opts { display: flex; flex-direction: column; gap: 9px; }
.opt {
  padding: 12px 18px; border: 2px solid #e2e8f0; border-radius: 12px;
  cursor: pointer; font-size: .96em; text-align: left;
  background: #fff; color: #334155; transition: all .18s;
  font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 10px;
}
.opt-letter {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f1f5f9; border: 2px solid #cbd5e1;
  display: flex; align-items: center; justify-content: center;
  font-size: .8em; font-weight: 700; color: #64748b; flex-shrink: 0; transition: all .18s;
}
.opt:hover:not(:disabled) { border-color: var(--gold); background: #fffbeb; transform: translateX(5px); }
.opt:hover:not(:disabled) .opt-letter { background: var(--gold); border-color: var(--gold); color: #fff; }
.opt.correct { border-color: var(--green); background: #f0fdf4; color: #065f46; font-weight: 600; }
.opt.correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
.opt.wrong   { border-color: var(--red); background: #fef2f2; color: #7f1d1d; }
.opt.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }
.opt:disabled { cursor: default; }

.q-feedback {
  margin-top: 14px; padding: 12px 16px; border-radius: 12px;
  font-size: .88em; line-height: 1.7; display: none; text-align: left;
}
.q-feedback.correct { background: #f0fdf4; border-left: 4px solid var(--green); color: #065f46; }
.q-feedback.wrong   { background: #fef2f2; border-left: 4px solid var(--red); color: #7f1d1d; }
.q-feedback .exp { color: #1e40af; margin-top: 6px; padding-top: 6px; border-top: 1px dashed #cbd5e1; font-size: .95em; }

.submit-wrap { max-width: 820px; margin: 24px auto; text-align: center; padding: 0 20px; }
.btn-submit {
  padding: 16px 70px; border: none; border-radius: 14px;
  background: linear-gradient(135deg,var(--teal),#0891b2);
  color: #fff; font-size: 1.1em; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .2s; box-shadow: 0 8px 30px rgba(14,116,144,.5);
}
.btn-submit:hover { transform: translateY(-3px); }
.btn-submit:disabled { opacity: .4; cursor: not-allowed; transform: none; }

#resultsBox {
  max-width: 820px; margin: 24px auto; padding: 40px;
  background: rgba(255,255,255,.97); border-radius: 24px;
  text-align: center; display: none;
  box-shadow: 0 30px 80px rgba(0,0,0,.4); animation: slideIn .4s ease;
}
#resultsBox h2 { font-family: 'Playfair Display', serif; color: var(--navy); font-size: 2em; margin-bottom: 8px; }
.score-ring { width: 160px; height: 160px; margin: 20px auto; position: relative; }
.score-ring svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: #e2e8f0; stroke-width: 12; }
.ring-fg { fill: none; stroke: url(#ringGrad); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
.score-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-center .big   { font-size: 2.4em; font-weight: 900; color: var(--navy); font-family: 'Playfair Display', serif; }
.score-center .small { font-size: .8em; color: #64748b; }
.result-msg { font-size: 1.05em; color: #475569; margin: 10px 0 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.stat-card  { border-radius: 16px; padding: 16px 10px; }
.stat-card.c { background: #f0fdf4; border: 2px solid #10b981; }
.stat-card.w { background: #fef2f2; border: 2px solid #ef4444; }
.stat-card.p { background: #fffbeb; border: 2px solid #f59e0b; }
.stat-card .num { font-size: 2em; font-weight: 900; font-family: 'Playfair Display', serif; }
.stat-card.c .num { color: #10b981; }
.stat-card.w .num { color: #ef4444; }
.stat-card.p .num { color: #f59e0b; }
.stat-card .lbl { font-size: .8em; color: #64748b; margin-top: 4px; }
.btn-re, .btn-home {
  width: 100%; padding: 14px; border: none; border-radius: 14px;
  font-size: 1.05em; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; margin-bottom: 10px; transition: all .2s;
}
.btn-re   { background: linear-gradient(135deg,var(--teal),#0891b2); color: #fff; }
.btn-home { background: #f1f5f9; color: #475569; }
.btn-re:hover   { transform: translateY(-2px); }
.btn-home:hover { background: #e2e8f0; }
.review-section { text-align: left; margin-top: 24px; }
.review-section h3 { color: var(--navy); font-size: 1.1em; margin-bottom: 14px; font-family: 'Playfair Display', serif; }
.rev-item { padding: 14px 16px; border-radius: 12px; margin-bottom: 10px; font-size: .88em; line-height: 1.6; text-align: left; }
.rev-item.wrong { background: #fef2f2; border-left: 4px solid var(--red); }
.rev-item .rt   { font-weight: 700; margin-bottom: 5px; color: #1e293b; }
.rev-item .exp  { color: #64748b; font-size: .9em; margin-top: 5px; }

@media(max-width:600px){
  .start-card{padding:28px 22px}
  .start-card h1{font-size:1.7em}
  .q-card{padding:20px 18px;margin:14px 12px}
  #resultsBox{padding:28px 20px}
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="sticky" id="stickyBar" style="display:none">
  <div class="sticky-inner">
    <div class="pill pill-q" id="sNum">0/0</div>
    <div class="pill pill-c" id="sC">✅ 0</div>
    <div class="pill pill-w" id="sW">❌ 0</div>
    <div class="pill pill-p" id="sP">📊 0%</div>
    <div class="prog-wrap"><div class="prog-fill" id="sFill" style="width:0%"></div></div>
  </div>
</div>

<div id="startScreen">
  <div class="start-card">
    <span class="book-icon">⚗️</span>
    <h1>General Chemistry Quiz</h1>
    <p class="subtitle">كيمياء عامة · مراجعة شاملة</p>
    <p class="credits">Questions Bank — General Chemistry Revision<br>
      <span class="credits-names">𝑩𝒀 𝑴𝑶𝑺𝑻𝑨𝑭𝑨 𝑺𝑨𝑳𝑳𝑨𝑴&زعزع</span></p>
    <p class="section-label">Choose Topic / اختر الوحدة</p>
    <div class="filter-group">
      <button class="filter-btn active" onclick="selectCat('all',this)">📚 All</button>
      <button class="filter-btn" onclick="selectCat('matter',this)">🧪 Matter & States</button>
      <button class="filter-btn" onclick="selectCat('atoms',this)">⚛️ Atoms & Bonding</button>
      <button class="filter-btn" onclick="selectCat('periodic',this)">📋 Periodic Table</button>
      <button class="filter-btn" onclick="selectCat('reactions',this)">🔥 Chemical Reactions</button>
      <button class="filter-btn" onclick="selectCat('equations',this)">⚖️ Chemical Equations</button>
      <button class="filter-btn" onclick="selectCat('solutions',this)">💧 Solutions & Acids</button>
      <button class="filter-btn" onclick="selectCat('truefalse',this)">✅ True / False</button>
    </div>
    <p class="start-info">Number of Questions: <span id="qCount">0</span></p>
    <button class="btn-start" onclick="startQuiz()">Start Quiz ▶</button>
  </div>
</div>

<div id="quizWrapper">
  <div id="cardsContainer"></div>
  <div class="submit-wrap">
    <button class="btn-submit" id="submitBtn" onclick="showResults()" disabled>Show Results 🎯</button>
  </div>
  <div id="resultsBox">
    <h2>🎉 Quiz Complete!</h2>
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0e7490"/>
            <stop offset="100%" stop-color="#f59e0b"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="80" cy="80" r="64"/>
        <circle class="ring-fg" id="ringFg" cx="80" cy="80" r="64" stroke-dasharray="402" stroke-dashoffset="402"/>
      </svg>
      <div class="score-center">
        <span class="big" id="rScore">0</span>
        <span class="small">of <span id="rTotal">0</span></span>
      </div>
    </div>
    <div class="result-msg" id="rMsg"></div>
    <div class="stats-grid">
      <div class="stat-card c"><div class="num" id="rC">0</div><div class="lbl">✅ Correct</div></div>
      <div class="stat-card w"><div class="num" id="rW">0</div><div class="lbl">❌ Wrong</div></div>
      <div class="stat-card p"><div class="num" id="rP">0%</div><div class="lbl">📊 Score</div></div>
    </div>
    <button class="btn-re"   onclick="startQuiz()">🔄 Retry Quiz</button>
    <button class="btn-home" onclick="goHome()">🏠 Home</button>
    <div class="review-section" id="reviewDiv"></div>
  </div>
</div>

<script>
const LETTERS = ['A','B','C','D'];

const CAT_LABELS = {
  matter:    '🧪 Matter & States',
  atoms:     '⚛️ Atoms & Bonding',
  periodic:  '📋 Periodic Table',
  reactions: '🔥 Chemical Reactions',
  equations: '⚖️ Equations',
  solutions: '💧 Solutions & Acids',
  truefalse: '✅ True / False',
};

// ── ALL QUESTIONS ──────────────────────────────────────────────
const ALL = [

  // ── MATTER & STATES (from images) ──
  {n:1, cat:'matter', q:"Matter is anything that has:", opts:["color","mass and occupies space","shape only","volume only"], c:1, exp:"Matter = anything with mass and takes up space."},
  {n:2, cat:'matter', q:"Which state of matter has fixed shape and volume?", opts:["liquid","gas","solid","plasma"], c:2, exp:"Solid has both fixed shape and fixed volume."},
  {n:3, cat:'matter', q:"Which mixture has the same composition everywhere?", opts:["heterogeneous mixture","homogeneous mixture","suspension","colloid"], c:1, exp:"Homogeneous mixture = uniform composition throughout (e.g. salt water)."},
  {n:4, cat:'matter', q:"Which of the following is a heterogeneous mixture?", opts:["salt water","air","sand and water","sugar solution"], c:2, exp:"Sand and water = heterogeneous — you can see distinct parts."},
  {n:5, cat:'matter', q:"A pure substance can be:", opts:["element or compound","mixture only","gas only","liquid only"], c:0, exp:"Pure substances are either elements (one type of atom) or compounds (chemically combined elements)."},
  {n:6, cat:'matter', q:"Which of the following is an element?", opts:["H₂O","CO₂","O₂","NaCl"], c:2, exp:"O₂ = pure element (only oxygen atoms). H₂O, CO₂, NaCl are compounds."},
  {n:7, cat:'matter', q:"Water is a:", opts:["mixture","compound","element","solution"], c:1, exp:"Water (H₂O) is a compound — two elements chemically bonded."},
  {n:8, cat:'matter', q:"The law stating that matter is not created or destroyed is:", opts:["law of gravity","law of conservation of mass","law of energy","law of motion"], c:1, exp:"Law of Conservation of Mass: mass is neither created nor destroyed in a chemical reaction."},
  {n:9, cat:'matter', q:"Physical properties describe the appearance of matter.", opts:["True","False"], c:0, tf:true, exp:"True — physical properties include color, density, melting point, etc."},
  {n:10, cat:'matter', q:"Chemical properties describe chemical reactions.", opts:["True","False"], c:0, tf:true, exp:"True — chemical properties describe how a substance changes into another substance."},
  {n:11, cat:'matter', q:"Color is a chemical property.", opts:["True","False"], c:1, tf:true, exp:"False — color is a PHYSICAL property, not chemical."},
  {n:12, cat:'matter', q:"Flammability is a chemical property.", opts:["True","False"], c:0, tf:true, exp:"True — flammability describes how a substance reacts with oxygen (chemical change)."},

  // ── ATOMS & BONDING (from images) ──
  {n:13, cat:'atoms', q:"The basic unit of an element is:", opts:["Molecule","Atom","Compound","Ion"], c:1, exp:"The atom is the smallest unit of an element that retains its properties."},
  {n:14, cat:'atoms', q:"Which subatomic particle has a negative charge?", opts:["Proton","Neutron","Electron","Nucleus"], c:2, exp:"Electrons are negatively charged. Protons are positive, neutrons are neutral."},
  {n:15, cat:'atoms', q:"Which particles are located in the nucleus?", opts:["Electrons only","Protons and neutrons","Electrons and protons","Neutrons and electrons"], c:1, exp:"The nucleus contains protons (+) and neutrons (neutral). Electrons orbit outside."},
  {n:16, cat:'atoms', q:"The atomic number represents the number of:", opts:["Neutrons","Electrons","Protons","Orbitals"], c:2, exp:"Atomic number = number of protons. This defines the element."},
  {n:17, cat:'atoms', q:"The mass number equals:", opts:["Protons + electrons","Protons + neutrons","Neutrons + electrons","Protons only"], c:1, exp:"Mass number = protons + neutrons (in the nucleus)."},
  {n:18, cat:'atoms', q:"Isotopes are atoms that have:", opts:["Same protons and neutrons","Same neutrons only","Same protons but different neutrons","Different protons"], c:2, exp:"Isotopes = same element (same protons) but different number of neutrons."},
  {n:19, cat:'atoms', q:"Which carbon isotope is radioactive?", opts:["C-12","C-13","C-14","C-16"], c:2, exp:"C-14 (Carbon-14) is radioactive and used in radiocarbon dating."},
  {n:20, cat:'atoms', q:"Electrons move around the nucleus in regions called:", opts:["Nuclei","Orbitals","Bonds","Ions"], c:1, exp:"Electrons occupy orbitals (or electron shells) around the nucleus."},
  {n:21, cat:'atoms', q:"Electrons in the outer shell are called:", opts:["Core electrons","Valence electrons","Inner electrons","Atomic electrons"], c:1, exp:"Valence electrons = electrons in the outermost shell. They determine chemical behavior."},
  {n:22, cat:'atoms', q:"Atoms form bonds mainly to:", opts:["Increase mass","Become unstable","Achieve lower energy and stability","Gain neutrons"], c:2, exp:"Atoms bond to achieve a lower energy state (stability), usually by filling the outer shell."},
  {n:23, cat:'atoms', q:"According to the octet rule, atoms tend to have:", opts:["2 electrons","4 electrons","8 electrons in outer shell","10 electrons"], c:2, exp:"Octet rule: atoms tend to gain/lose/share electrons to have 8 valence electrons (like noble gases)."},
  {n:24, cat:'atoms', q:"Which atoms follow the duet rule?", opts:["Sodium","Chlorine","Hydrogen","Calcium"], c:2, exp:"Hydrogen follows the duet rule — it only needs 2 electrons (like Helium) to be stable."},
  {n:25, cat:'atoms', q:"Ionic bonds occur between:", opts:["Two metals","Two non-metals","Metal and non-metal","Noble gases"], c:2, exp:"Ionic bonds form between a metal (loses electrons) and a non-metal (gains electrons)."},
  {n:26, cat:'atoms', q:"Ionic bonds occur between metals and non-metals.", opts:["True","False"], c:0, tf:true, exp:"True — ionic bonding involves electron transfer from metal to non-metal."},
  {n:27, cat:'atoms', q:"Covalent bonds involve electron sharing.", opts:["True","False"], c:0, tf:true, exp:"True — covalent bonds form when atoms share electrons."},
  {n:28, cat:'atoms', q:"Metals gain electrons during ionic bonding.", opts:["True","False"], c:1, tf:true, exp:"False — metals LOSE electrons during ionic bonding. Non-metals gain electrons."},
  {n:29, cat:'atoms', q:"Metallic bonding contains free electrons.", opts:["True","False"], c:0, tf:true, exp:"True — metallic bonding has a 'sea' of delocalized free electrons, which allows conduction."},
  {n:30, cat:'atoms', q:"Noble gases follow the octet rule naturally.", opts:["True","False"], c:0, tf:true, exp:"True — noble gases already have full outer shells (8 electrons), so they are stable and unreactive."},
  {n:31, cat:'atoms', q:"In ionic bonding, metals usually:", opts:["Gain electrons","Lose electrons","Share electrons","Gain neutrons"], c:1, exp:"Metals lose electrons → form positive ions (cations)."},
  {n:32, cat:'atoms', q:"A covalent bond is formed by:", opts:["Transfer of electrons","Sharing electrons","Loss of neutrons","Nuclear attraction"], c:1, exp:"Covalent bond = sharing of electron pairs between atoms."},
  {n:33, cat:'atoms', q:"Which bond is the strongest?", opts:["Single bond","Double bond","Triple bond","Ionic bond"], c:2, exp:"Triple bond is the strongest — it involves 3 shared electron pairs and is very hard to break."},
  {n:34, cat:'atoms', q:"A nonpolar covalent bond occurs when:", opts:["Electrons are transferred","Electrons are shared equally","Electrons are shared unequally","Electrons are lost"], c:1, exp:"Nonpolar covalent = electrons shared EQUALLY between atoms of the same electronegativity."},
  {n:35, cat:'atoms', q:"Water (H₂O) is an example of:", opts:["Nonpolar molecule","Polar covalent molecule","Ionic compound","Metallic compound"], c:1, exp:"H₂O is polar covalent — oxygen pulls electrons more strongly than hydrogen (unequal sharing)."},
  {n:36, cat:'atoms', q:"Metallic bonding occurs between:", opts:["Non-metals","Metals","Noble gases","Molecules"], c:1, exp:"Metallic bonds form between metal atoms — free electrons move through a lattice of positive ions."},
  {n:37, cat:'atoms', q:"Metals conduct electricity because:", opts:["They contain ions","They contain free moving electrons","They have neutrons","They have strong nuclei"], c:1, exp:"Free delocalized electrons in metals can move freely → conduct electricity and heat."},
  {n:38, cat:'atoms', q:"Protons determine the identity of an element.", opts:["True","False"], c:0, tf:true, exp:"True — the number of protons (atomic number) uniquely identifies an element."},
  {n:39, cat:'atoms', q:"Electrons determine chemical behavior.", opts:["True","False"], c:0, tf:true, exp:"True — valence electrons control how atoms bond and react."},
  {n:40, cat:'atoms', q:"Isotopes have the same number of neutrons.", opts:["True","False"], c:1, tf:true, exp:"False — isotopes have the SAME number of protons but DIFFERENT number of neutrons."},
  {n:41, cat:'atoms', q:"Valence electrons control reactivity.", opts:["True","False"], c:0, tf:true, exp:"True — valence electrons determine how and with what atoms bond."},
  {n:42, cat:'atoms', q:"Flame tests identify metals.", opts:["True","False"], c:0, tf:true, exp:"True — different metals emit characteristic colors in a flame test (e.g. Na = yellow, K = purple)."},

  // ── PERIODIC TABLE (from PDF) ──
  {n:43, cat:'periodic', q:"The modern periodic table is arranged according to:", opts:["Atomic mass","Atomic number","Density","Atomic volume"], c:1, exp:"Modern periodic table is arranged by increasing atomic number (number of protons)."},
  {n:44, cat:'periodic', q:"Horizontal rows in the periodic table are called:", opts:["Groups","Families","Periods","Blocks"], c:2, exp:"Periods = horizontal rows. There are 7 periods in the modern periodic table."},
  {n:45, cat:'periodic', q:"How many periods are in the modern periodic table?", opts:["5","6","7","8"], c:2, exp:"There are 7 periods in the modern periodic table."},
  {n:46, cat:'periodic', q:"Vertical columns in the periodic table are called:", opts:["Periods","Groups","Series","Blocks"], c:1, exp:"Groups (or families) = vertical columns. Elements in a group have similar properties."},
  {n:47, cat:'periodic', q:"Elements in the same group have the same:", opts:["Atomic number","Number of shells","Valence electrons","Mass number"], c:2, exp:"Same group = same number of valence electrons → similar chemical behavior."},
  {n:48, cat:'periodic', q:"Atomic size across a period from left to right:", opts:["Increases","Decreases","Remains constant","Doubles"], c:1, exp:"Atomic radius decreases across a period → more protons pull electrons closer to nucleus."},
  {n:49, cat:'periodic', q:"Electronegativity across a period from left to right:", opts:["Decreases","Increases","Remains constant","Disappears"], c:1, exp:"Electronegativity increases across a period (left to right) as nuclear charge increases."},
  {n:50, cat:'periodic', q:"Which group contains alkali metals?", opts:["Group 1","Group 2","Group 17","Group 18"], c:0, exp:"Group 1 = Alkali metals (Li, Na, K, Rb, Cs, Fr). Valency = +1."},
  {n:51, cat:'periodic', q:"Which group contains alkaline earth metals?", opts:["Group 1","Group 2","Group 16","Group 17"], c:1, exp:"Group 2 = Alkaline earth metals (Be, Mg, Ca, Sr, Ba, Ra). Valency = +2."},
  {n:52, cat:'periodic', q:"Halogens are located in:", opts:["Group 15","Group 16","Group 17","Group 18"], c:2, exp:"Group 17 = Halogens (F, Cl, Br, I, At). Very reactive non-metals. Valency = -1."},
  {n:53, cat:'periodic', q:"Noble gases are found in:", opts:["Group 16","Group 17","Group 18","Group 19"], c:2, exp:"Group 18 = Noble gases (He, Ne, Ar, Kr, Xe, Rn). Completely full outer shells."},
  {n:54, cat:'periodic', q:"Noble gases are chemically:", opts:["Highly reactive","Inert","Metallic","Toxic"], c:1, exp:"Noble gases are chemically inert (unreactive) because they have complete outer electron shells."},
  {n:55, cat:'periodic', q:"Metals are usually:", opts:["Poor conductors","Good conductors","Gases","Transparent"], c:1, exp:"Metals are good conductors of heat and electricity due to free electrons."},
  {n:56, cat:'periodic', q:"Metals tend to form:", opts:["Negative ions","Positive ions","Neutral ions","No ions"], c:1, exp:"Metals lose electrons → form positive ions (cations)."},
  {n:57, cat:'periodic', q:"Non-metals usually:", opts:["Lose electrons","Gain electrons","Do not react","Form metals"], c:1, exp:"Non-metals gain electrons → form negative ions (anions)."},
  {n:58, cat:'periodic', q:"Metalloids are located:", opts:["At the center","Along the zig-zag line","At the bottom","Outside the table"], c:1, exp:"Metalloids lie along the staircase (zig-zag) line between metals and non-metals."},
  {n:59, cat:'periodic', q:"Which element is an alkali metal?", opts:["Na","Ca","Cl","Ne"], c:0, exp:"Na (Sodium) is in Group 1 = alkali metal. Ca = alkaline earth, Cl = halogen, Ne = noble gas."},
  {n:60, cat:'periodic', q:"Which element is a halogen?", opts:["Na","Cl","Fe","Ca"], c:1, exp:"Cl (Chlorine) is in Group 17 = halogen."},
  {n:61, cat:'periodic', q:"Which element is a noble gas?", opts:["He","Na","Ca","Mg"], c:0, exp:"He (Helium) is in Group 18 = noble gas."},
  {n:62, cat:'periodic', q:"Reactivity of metals down a group:", opts:["Decreases","Increases","Remains constant","Stops"], c:1, exp:"Metallic reactivity increases down a group — outer electrons are further from nucleus and lost more easily."},
  {n:63, cat:'periodic', q:"Ionization energy down a group:", opts:["Increases","Decreases","Remains constant","Doubles"], c:1, exp:"Ionization energy decreases down a group — outer electrons are farther away and held less tightly."},
  {n:64, cat:'periodic', q:"Metallic character across a period:", opts:["Increases","Decreases","Remains constant","Doubles"], c:1, exp:"Metallic character decreases across a period (left to right) as atoms gain more electrons."},
  {n:65, cat:'periodic', q:"Alkali metals usually have valency:", opts:["+1","+2","−1","0"], c:0, exp:"Alkali metals (Group 1) have 1 valence electron → lose it → valency = +1."},
  {n:66, cat:'periodic', q:"Alkaline earth metals have valency:", opts:["+1","+2","+3","−1"], c:1, exp:"Alkaline earth metals (Group 2) have 2 valence electrons → lose both → valency = +2."},
  {n:67, cat:'periodic', q:"Halogens usually have valency:", opts:["+1","−1","+2","0"], c:1, exp:"Halogens (Group 17) gain 1 electron → valency = −1."},
  {n:68, cat:'periodic', q:"Noble gases have valency:", opts:["+1","−1","0","+2"], c:2, exp:"Noble gases have complete shells → do not bond → valency = 0."},
  {n:69, cat:'periodic', q:"Transition metals are located in:", opts:["Groups 1–2","Groups 3–12","Groups 13–18","Period 7"], c:1, exp:"Transition metals = Groups 3–12 (d-block elements)."},
  {n:70, cat:'periodic', q:"Transition metals often form:", opts:["Colorless compounds","Colored compounds","No compounds","Gases"], c:1, exp:"Transition metals form colored compounds due to partially filled d-orbitals."},
  {n:71, cat:'periodic', q:"Transition metals are often used as:", opts:["Catalysts","Insulators","Non-metals","Gases"], c:0, exp:"Transition metals are widely used as catalysts (e.g. Fe in Haber process, Pt in catalytic converters)."},
  {n:72, cat:'periodic', q:"Elements in the same period have the same number of:", opts:["Valence electrons","Electron shells","Protons","Neutrons"], c:1, exp:"Same period = same number of electron shells (energy levels)."},

  // ── CHEMICAL REACTIONS (from images) ──
  {n:73, cat:'reactions', q:"Atoms are created during chemical reactions.", opts:["True","False"], c:1, tf:true, exp:"False — atoms are NEVER created or destroyed in chemical reactions (Law of Conservation of Mass)."},
  {n:74, cat:'reactions', q:"Atoms can be rearranged during reactions.", opts:["True","False"], c:0, tf:true, exp:"True — chemical reactions rearrange atoms to form new substances."},
  {n:75, cat:'reactions', q:"Compounds can be separated into elements by chemical reactions.", opts:["True","False"], c:0, tf:true, exp:"True — decomposition reactions break compounds into simpler substances or elements."},
  {n:76, cat:'reactions', q:"Atomic nuclei change during ordinary chemical reactions.", opts:["True","False"], c:1, tf:true, exp:"False — only electrons are involved in chemical reactions. Nuclear changes require nuclear reactions."},
  {n:77, cat:'reactions', q:"A chemical reaction is a process in which:", opts:["Substances remain the same","New substances are formed","Atoms disappear","Only physical change occurs"], c:1, exp:"Chemical reaction = process where reactants transform into new products (new substances)."},
  {n:78, cat:'reactions', q:"Chemical reactions involve:", opts:["Creating atoms","Breaking and forming chemical bonds","Only breaking bonds","Only forming bonds"], c:1, exp:"Chemical reactions involve BOTH breaking bonds in reactants and forming new bonds in products."},
  {n:79, cat:'reactions', q:"In the formation of water (H₂O):", opts:["Only O=O bonds break","Only H–H bonds break","H–H and O=O bonds break and O–H bonds form","No bonds break"], c:2, exp:"2H₂ + O₂ → 2H₂O: H–H bonds and O=O bonds break; O–H bonds form."},
  {n:80, cat:'reactions', q:"An exothermic reaction is a reaction that:", opts:["Absorbs heat","Releases energy","Stops the reaction","Produces gas"], c:1, exp:"Exothermic = releases energy (heat) to surroundings. Products have less energy than reactants."},
  {n:81, cat:'reactions', q:"An endothermic reaction:", opts:["Releases energy","Absorbs energy","Produces light only","Does not require energy"], c:1, exp:"Endothermic = absorbs energy from surroundings. Products have more energy than reactants."},
  {n:82, cat:'reactions', q:"Reaction rate means:", opts:["Amount of product","Speed of the reaction","Temperature of reaction","Size of molecules"], c:1, exp:"Reaction rate = speed at which reactants are converted to products."},
  {n:83, cat:'reactions', q:"In a synthesis reaction:", opts:["One compound breaks","Two or more substances combine","One element replaces another","Ions exchange places"], c:1, exp:"Synthesis: A + B → AB. Two or more substances combine to form one product."},
  {n:84, cat:'reactions', q:"General equation for synthesis reaction:", opts:["AB → A + B","A + BC → AC + B","A + B → AB","AB + CD → AD + CB"], c:2, exp:"Synthesis general form: A + B → AB. Two reactants form one product."},
  {n:85, cat:'reactions', q:"Decomposition reaction means:", opts:["Two substances combine","One compound breaks into simpler substances","Exchange of ions","Reaction with oxygen"], c:1, exp:"Decomposition: AB → A + B. One compound breaks down into simpler substances."},
  {n:86, cat:'reactions', q:"The reaction 2H₂O₂ → 2H₂O + O₂ is an example of:", opts:["Synthesis","Decomposition","Combustion","Replacement"], c:1, exp:"One compound (H₂O₂) breaks down into simpler substances (H₂O and O₂) = Decomposition."},
  {n:87, cat:'reactions', q:"In single replacement reactions:", opts:["One element replaces another","Two compounds exchange ions","Molecules combine","Oxygen reacts with fuel"], c:0, exp:"Single replacement: A + BC → AC + B. One element replaces another in a compound."},
  {n:88, cat:'reactions', q:"The reaction Zn + 2HCl → ZnCl₂ + H₂ is an example of:", opts:["Combustion","Single replacement","Double replacement","Synthesis"], c:1, exp:"Zinc (Zn) replaces hydrogen (H) in HCl = Single replacement reaction."},
  {n:89, cat:'reactions', q:"In double replacement reactions:", opts:["One compound breaks","One element replaces another","Two compounds exchange ions","Fuel reacts with oxygen"], c:2, exp:"Double replacement: AB + CD → AD + CB. Ions from two compounds switch partners."},
  {n:90, cat:'reactions', q:"The reaction AgNO₃ + NaCl → AgCl + NaNO₃ is an example of:", opts:["Synthesis","Decomposition","Double replacement","Combustion"], c:2, exp:"Ag⁺ and Na⁺ swap partners = Double replacement (metathesis) reaction."},
  {n:91, cat:'reactions', q:"Combustion reactions involve:", opts:["Oxygen and fuel","Two metals","Water formation","Ion exchange"], c:0, exp:"Combustion = fuel + oxygen → CO₂ + H₂O + energy (heat and light)."},
  {n:92, cat:'reactions', q:"Combustion reactions usually:", opts:["Absorb energy","Release energy","Stop reactions","Reduce molecules"], c:1, exp:"Combustion is exothermic — it releases energy as heat and light."},
  {n:93, cat:'reactions', q:"Which reaction is usually very fast?", opts:["Rusting iron","Explosion","Digestion","Corrosion"], c:1, exp:"Explosions are extremely fast reactions. Rusting and corrosion are slow; digestion is medium."},
  {n:94, cat:'reactions', q:"Which reaction is very slow?", opts:["Explosion","Burning gas","Rusting iron","Neutralization"], c:2, exp:"Rusting (iron oxidation) is a very slow reaction that occurs over days/months/years."},
  {n:95, cat:'reactions', q:"Increasing concentration will:", opts:["Slow the reaction","Stop the reaction","Increase reaction rate","Decrease energy"], c:2, exp:"Higher concentration = more particles in a given volume → more collisions → faster reaction."},
  {n:96, cat:'reactions', q:"Increasing temperature usually:", opts:["Slows the reaction","Stops the reaction","Speeds up the reaction","Reduces molecules"], c:2, exp:"Higher temperature = particles move faster → more frequent and energetic collisions → faster reaction."},
  {n:97, cat:'reactions', q:"Laboratory reactions in biological systems often occur at:", opts:["0°C","25°C","37°C","100°C"], c:2, exp:"37°C = normal human body temperature. Biological reactions (enzymes) work optimally at this temperature."},
  {n:98, cat:'reactions', q:"Smaller particles increase reaction rate because:", opts:["They increase surface area","They reduce molecules","They reduce temperature","They stop the reaction"], c:0, exp:"Smaller particles = greater surface area exposed → more collisions with reactant particles → faster rate."},
  {n:99, cat:'reactions', q:"Catalysts:", opts:["Stop reactions","Slow reactions","Speed up reactions","Destroy reactants"], c:2, exp:"Catalysts speed up reactions by providing an alternative pathway with lower activation energy."},
  {n:100, cat:'reactions', q:"In the human body, catalysts are usually:", opts:["Hormones","Enzymes","Vitamins","Minerals"], c:1, exp:"Enzymes are biological catalysts — protein molecules that speed up metabolic reactions."},

  // ── CHEMICAL EQUATIONS (from images + PDF) ──
  {n:101, cat:'equations', q:"A chemical equation is used to:", opts:["Describe physical change","Represent a chemical reaction using symbols","Show only products","Show only reactants"], c:1, exp:"Chemical equation = symbolic representation of a chemical reaction using chemical formulas."},
  {n:102, cat:'equations', q:"Substances present before the reaction are called:", opts:["Products","Reactants","Catalysts","Solutions"], c:1, exp:"Reactants are the starting materials, written on the LEFT side of the equation."},
  {n:103, cat:'equations', q:"Substances formed after the reaction are called:", opts:["Reactants","Catalysts","Products","Solvents"], c:2, exp:"Products are the new substances formed, written on the RIGHT side of the equation."},
  {n:104, cat:'equations', q:"The arrow (→) in a chemical equation means:", opts:["Reacts with","Produces","Equal to","Combines"], c:1, exp:"The arrow (→) means 'produces' or 'yields'. Reactants → Products."},
  {n:105, cat:'equations', q:"The symbol (+) in chemical equations means:", opts:["Produces","Reacts with","Heat","Gas released"], c:1, exp:"The (+) sign between formulas means 'reacts with' or 'combined with'."},
  {n:106, cat:'equations', q:"Chemical equations use chemical ______ to represent reactions.", opts:["symbols","numbers","words","diagrams"], c:0, exp:"Chemical equations use chemical symbols and formulas to represent reactions concisely."},
  {n:107, cat:'equations', q:"Reactants are written on the ______ side of the equation.", opts:["right","left","top","bottom"], c:1, exp:"Reactants are always on the LEFT side of the arrow; products on the right."},
  {n:108, cat:'equations', q:"The symbol (aq) means the substance is dissolved in ______.", opts:["alcohol","acid","water","air"], c:2, exp:"(aq) = aqueous = dissolved in water. Other state symbols: (s) solid, (l) liquid, (g) gas."},
  {n:109, cat:'equations', q:"The symbol (g) indicates a ______.", opts:["solid","liquid","gas","solution"], c:2, exp:"(g) = gaseous state. State symbols: (s) solid, (l) liquid, (g) gas, (aq) aqueous."},
  {n:110, cat:'equations', q:"A precipitate is indicated by the symbol ______.", opts:["↑","↓","→","≡"], c:1, exp:"↓ (downward arrow) indicates a precipitate — an insoluble solid that forms from solution."},
  {n:111, cat:'equations', q:"Gas release is indicated by the symbol ______.", opts:["↓","→","↑","≡"], c:2, exp:"↑ (upward arrow) indicates a gas being released from a reaction."},
  {n:112, cat:'equations', q:"Coefficients are ______ numbers written before formulas.", opts:["small","big","subscript","superscript"], c:1, exp:"Coefficients are the large numbers in front of chemical formulas that balance the equation."},
  {n:113, cat:'equations', q:"Subscripts represent the number of ______ in a molecule.", opts:["molecules","bonds","atoms","charges"], c:2, exp:"Subscripts (small numbers after element symbols) show how many atoms of that element are in the molecule."},
  {n:114, cat:'equations', q:"What is a chemical equation?", opts:["A physical description","A symbolic representation of a chemical reaction","A list of elements","A temperature measurement"], c:1, exp:"A chemical equation is a symbolic representation showing reactants → products."},
  {n:115, cat:'equations', q:"What are reactants?", opts:["Products of reaction","The starting substances in a chemical reaction","Catalysts only","Ions in solution"], c:1, exp:"Reactants = starting substances that undergo change in a chemical reaction."},
  {n:116, cat:'equations', q:"The symbol (⇌) indicates:", opts:["Gas formation","Irreversible reaction","Reversible reaction","Combustion reaction"], c:2, exp:"⇌ = reversible reaction — the reaction can proceed in both forward and reverse directions."},
  {n:117, cat:'equations', q:"Which symbol indicates a solid substance?", opts:["(g)","(s)","(l)","(aq)"], c:1, exp:"(s) = solid state. The four state symbols are: (s) solid, (l) liquid, (g) gas, (aq) aqueous."},
  {n:118, cat:'equations', q:"Which symbol means aqueous solution?", opts:["(s)","(l)","(g)","(aq)"], c:3, exp:"(aq) = aqueous = substance dissolved in water."},
  {n:119, cat:'equations', q:"The symbol (Δ) in a chemical equation means:", opts:["Gas released","Heat is applied","Catalyst present","Reaction stops"], c:1, exp:"Δ (delta) above the arrow means heat is applied to the reaction."},
  {n:120, cat:'equations', q:"In chemical equations, coefficients represent:", opts:["Number of atoms in a molecule","Number of molecules","Atomic number","Energy level"], c:1, exp:"Coefficients represent the number of molecules (or moles) of each substance in the reaction."},

  // ── SOLUTIONS, ACIDS & BASES (from PDF) ──
  {n:121, cat:'solutions', q:"A solution is defined as:", opts:["a heterogeneous mixture","a homogeneous mixture of two or more substances","only a solid in a solid","only a gas in a gas"], c:1, exp:"Solution = homogeneous mixture where solute is uniformly distributed in solvent."},
  {n:122, cat:'solutions', q:"In a solution, the substance present in the smaller amount is called the:", opts:["solvent","solute","mixture","electrolyte"], c:1, exp:"Solute = the dissolved substance (smaller amount). Solvent = the dissolving medium (larger amount)."},
  {n:123, cat:'solutions', q:"Water is the solvent in:", opts:["alloys","air","aqueous solutions","dental amalgam"], c:2, exp:"Aqueous solutions use water as solvent. 'Aqueous' comes from Latin aqua = water."},
  {n:124, cat:'solutions', q:"An example of a gas-in-gas solution is:", opts:["seawater","vinegar","air","soda water"], c:2, exp:"Air = mixture of gases (N₂, O₂, CO₂, etc.) = gas-in-gas solution."},
  {n:125, cat:'solutions', q:"An example of a solid-in-liquid solution is:", opts:["air","seawater (NaCl in water)","brass","dental amalgam"], c:1, exp:"Seawater = NaCl (solid) dissolved in water (liquid) = solid-in-liquid solution."},
  {n:126, cat:'solutions', q:"Which of the following is a non-electrolyte?", opts:["NaCl","HCl","sugar (sucrose)","HF"], c:2, exp:"Sugar (sucrose) does not dissociate into ions in solution → non-electrolyte → does not conduct electricity."},
  {n:127, cat:'solutions', q:"Strong electrolytes:", opts:["do not conduct electricity","partially dissociate","completely (100%) dissociate into ions","are only gases"], c:2, exp:"Strong electrolytes completely dissociate into ions → excellent conductors. (e.g. NaCl, HCl, NaOH)."},
  {n:128, cat:'solutions', q:"The process in which a molecule splits into ions is called:", opts:["ionization only","dissociation","both dissociation and ionization","neither"], c:2, exp:"Both terms apply: ionization (for molecules like HCl forming H⁺) and dissociation (for ionic compounds like NaCl)."},
  {n:129, cat:'solutions', q:"HF is an example of:", opts:["strong electrolyte","non-electrolyte","weak electrolyte","solid solution"], c:2, exp:"HF is a weak acid → partially dissociates → weak electrolyte."},
  {n:130, cat:'solutions', q:"Which statement about water is correct?", opts:["It is non-polar","It has positive and negative regions (polar)","It never dissolves ionic compounds","It is electrically charged"], c:1, exp:"Water is polar (bent shape, O is δ⁻, H is δ⁺) — this allows it to dissolve many ionic and polar substances."},
  {n:131, cat:'solutions', q:"Acids taste:", opts:["bitter","sour","sweet","salty"], c:1, exp:"Acids taste sour (e.g. vinegar = acetic acid, lemon = citric acid). Bases taste bitter."},
  {n:132, cat:'solutions', q:"Acids change litmus paper from:", opts:["red to blue","blue to red","green to yellow","no change"], c:1, exp:"Acids turn blue litmus paper RED. Bases turn red litmus paper BLUE."},
  {n:133, cat:'solutions', q:"Bases feel:", opts:["dry","slippery","rough","sticky"], c:1, exp:"Bases feel slippery/soapy (e.g. soap, NaOH solution)."},
  {n:134, cat:'solutions', q:"According to Arrhenius, a base produces:", opts:["H⁺ ions","OH⁻ ions","Na⁺ ions","Cl⁻ ions"], c:1, exp:"Arrhenius base = produces OH⁻ ions in aqueous solution. Arrhenius acid = produces H⁺ ions."},
  {n:135, cat:'solutions', q:"According to Brønsted-Lowry, an acid is a:", opts:["proton acceptor","proton donor","electron donor","electron acceptor"], c:1, exp:"Brønsted-Lowry acid = proton (H⁺) DONOR. Base = proton ACCEPTOR."},
  {n:136, cat:'solutions', q:"H₃O⁺ is called:", opts:["hydroxide ion","hydronium ion (hydrated proton)","chloride ion","ammonium ion"], c:1, exp:"H₃O⁺ = hydronium ion. Formed when H⁺ combines with a water molecule (H⁺ + H₂O → H₃O⁺)."},
  {n:137, cat:'solutions', q:"pH is defined as:", opts:["–log[OH⁻]","–log[H⁺]","log[H⁺]","log[OH⁻]"], c:1, exp:"pH = –log[H⁺]. Lower pH = more acidic. pH 7 = neutral; <7 acidic; >7 basic."},
  {n:138, cat:'solutions', q:"As [H⁺] increases, pH:", opts:["increases","decreases","stays the same","becomes zero"], c:1, exp:"Higher [H⁺] → lower pH (more acidic). pH = –log[H⁺], so higher H⁺ = lower pH value."},
  {n:139, cat:'solutions', q:"A strong acid has:", opts:["small Ka","large Ka","no Ka","zero Ka"], c:1, exp:"Strong acid = large Ka (large dissociation constant) → completely dissociates in solution."},
  {n:140, cat:'solutions', q:"HCl is:", opts:["weak acid","strong acid","weak base","non-electrolyte"], c:1, exp:"HCl (hydrochloric acid) is a strong acid — completely dissociates: HCl → H⁺ + Cl⁻."},
  {n:141, cat:'solutions', q:"CH₃COOH is:", opts:["strong acid","weak acid","strong base","none of the above"], c:1, exp:"CH₃COOH (acetic acid/vinegar) is a weak acid — only partially dissociates in solution."},
  {n:142, cat:'solutions', q:"NaOH is:", opts:["weak base","strong base","weak acid","non-electrolyte"], c:1, exp:"NaOH (sodium hydroxide) is a strong base — completely dissociates: NaOH → Na⁺ + OH⁻."},
  {n:143, cat:'solutions', q:"pOH + pH =", opts:["7","14 (at 25°C)","0","1"], c:1, exp:"pH + pOH = 14 at 25°C. This is because Kw = [H⁺][OH⁻] = 10⁻¹⁴ at 25°C."},
  {n:144, cat:'solutions', q:"A neutralization reaction produces:", opts:["only salt","salt + water","only water","acid + base"], c:1, exp:"Acid + Base → Salt + Water. This is a neutralization reaction."},
  {n:145, cat:'solutions', q:"In the reaction HCl + NaOH → NaCl + H₂O, the net ionic equation is:", opts:["H⁺ + Cl⁻ → HCl","H⁺ + OH⁻ → H₂O","Na⁺ + Cl⁻ → NaCl","NaOH + HCl → NaCl"], c:1, exp:"Net ionic equation shows only the species that actually react: H⁺ + OH⁻ → H₂O. Na⁺ and Cl⁻ are spectator ions."},
  {n:146, cat:'solutions', q:"Which is NOT a property of bases?", opts:["bitter taste","change litmus red to blue","sour taste","slippery feel"], c:2, exp:"Sour taste is a property of ACIDS, not bases. Bases taste bitter and feel slippery."},
  {n:147, cat:'solutions', q:"Household ammonia is:", opts:["strong acid","weak base","strong electrolyte only","non-electrolyte"], c:1, exp:"Ammonia (NH₃) in water forms NH₄OH — a weak base (partially dissociates)."},
  {n:148, cat:'solutions', q:"Vinegar is an example of:", opts:["strong acid solution","weak acid solution","strong base","gas solution"], c:1, exp:"Vinegar contains acetic acid (CH₃COOH) — a weak acid solution."},
  {n:149, cat:'solutions', q:"Which acid is listed as strong?", opts:["HF","CH₃COOH","HNO₃","H₃PO₄"], c:2, exp:"HNO₃ (nitric acid) is a strong acid. HF and CH₃COOH are weak acids. H₃PO₄ is weak."},
